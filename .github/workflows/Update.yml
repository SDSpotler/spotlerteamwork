name: Update Teamwork Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Show files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f

      - name: Run update script
        env:
          TEAMWORK_API_KEY: ${{ secrets.TEAMWORK_API_KEY }}
        run: python update_teamwork.py

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json details/*.json
          git diff --cached --quiet || git commit -m "Update Teamwork data"
          git push
