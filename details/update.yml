name: Update data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      TEAMWORK_API_KEY: ${{ secrets.TEAMWORK_API_KEY }}

    steps:
      - name: Repo ophalen
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Requests installeren
        run: pip install requests

      - name: Data ophalen
        run: python fetch.py

      - name: Commit data en details
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json details/*.json
          git commit -m "Update project data" || echo "No changes"
          git push
